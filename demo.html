/* ===== CSS Variables & Reset ===== */
:root {
  --primary: #1e40af;
  --primary-light: #3b82f6;
  --success: #16a34a;
  --warning: #d97706;
  --danger: #dc2626;
  --text: #1f2937;
  --text-muted: #6b7280;
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e5e7eb;
  --border-light: #f3f4f6;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
}
* { box-sizing: border-box; }
body { margin: 0; padding: 0; }
#root { min-height: 100vh; display: flex; flex-direction: column; }
h1, h2, h3, h4 { color: var(--text); margin: 0 0 0.5rem; }
h1 { font-size: 1.5rem; font-weight: 700; }
h2 { font-size: 1.25rem; font-weight: 600; }
h3 { font-size: 1.1rem; font-weight: 600; }
h4 { font-size: 0.95rem; font-weight: 600; }
p { margin: 0; }
code { font-family: "SF Mono", "Consolas", "Liberation Mono", monospace; font-size: 0.85em; background: var(--border-light); padding: 0.15em 0.4em; border-radius: 3px; }

/* ===== App Shell ===== */
.app { display: flex; flex-direction: column; min-height: 100vh; }
.app-header { background: var(--surface); border-bottom: 2px solid var(--primary); padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
.app-brand { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
.app-logo { background: var(--primary); color: white; font-weight: 800; font-size: 0.9rem; padding: 0.3rem 0.6rem; border-radius: 4px; letter-spacing: 1px; }
.app-title { display: flex; flex-direction: column; }
.title-main { font-weight: 700; font-size: 0.9rem; color: var(--text); }
.title-sub { font-size: 0.75rem; color: var(--text-muted); }
.app-nav { display: flex; gap: 0.25rem; margin-left: auto; }
.nav-btn { background: none; border: none; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.85rem; color: var(--text-muted); border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 0.5rem; transition: all 0.2s; height: 60px; }
.nav-btn:hover { color: var(--primary); background: rgba(30, 64, 175, 0.04); }
.nav-btn.nav-active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.nav-number { background: var(--border); color: var(--text-muted); width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; }
.nav-active .nav-number { background: var(--primary); color: white; }
.app-user { flex-shrink: 0; font-size: 0.8rem; color: var(--text-muted); background: var(--border-light); padding: 0.25rem 0.75rem; border-radius: 12px; }
.app-main { flex: 1; padding: 1.5rem; max-width: 1400px; width: 100%; margin: 0 auto; }
.app-footer { background: var(--surface); border-top: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); }

/* ===== Module Header ===== */
.module-header { margin-bottom: 1.5rem; }
.module-header h1 { margin-bottom: 0.25rem; }
.module-header p { color: var(--text-muted); }

/* ===== Cards ===== */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; }

/* ===== Badges ===== */
.badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
.badge-pass { background: rgba(22, 163, 74, 0.1); color: var(--success); }
.badge-fail { background: rgba(220, 38, 38, 0.1); color: var(--danger); }
.badge-warning { background: rgba(217, 119, 6, 0.1); color: var(--warning); }
.badge-na { background: var(--border-light); color: var(--text-muted); }

/* ===== KPIs ===== */
.kpi-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; flex: 1; min-width: 120px; text-align: center; }
.kpi-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
.kpi-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }

/* ===== Data Tables ===== */
.data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.data-table th, .data-table td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
.data-table th { background: var(--border-light); font-weight: 600; color: var(--text); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
.data-table tr:hover { background: rgba(59, 130, 246, 0.03); }
.row-fail { background: rgba(220, 38, 38, 0.03) !important; }

/* ===== Buttons ===== */
.btn { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; }
.btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
.btn-primary:hover { background: #1e3a8a; }
.btn-secondary { background: var(--surface); color: var(--text); }
.btn-secondary:hover { background: var(--border-light); }

/* ===== Info Box ===== */
.info-box { background: rgba(59, 130, 246, 0.05); border: 1px solid var(--primary-light); border-radius: 6px; padding: 0.75rem 1rem; font-size: 0.85rem; }

/* ===== Steps (Module 1) ===== */
.steps { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
.step { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 0.85rem; color: var(--text-muted); transition: all 0.2s; }
.step-active { border-color: var(--primary); color: var(--primary); font-weight: 600; }
.step-complete { border-color: var(--success); color: var(--success); }
.step-number { width: 22px; height: 22px; border-radius: 50%; background: var(--border); color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
.step-active .step-number { background: var(--primary); color: white; }
.step-complete .step-number { background: var(--success); color: white; }

/* ===== Upload Zone ===== */
.upload-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 2.5rem; text-align: center; cursor: pointer; transition: all 0.2s; }
.upload-zone:hover, .upload-zone.dragging { border-color: var(--primary); background: rgba(30, 64, 175, 0.03); }

/* ===== Progress Bar ===== */
.progress-bar { width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.3s ease; }

/* ===== Guidance Cards (Module 1) ===== */
.guidance-card { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
.guidance-header { padding: 0.75rem 1rem; background: var(--border-light); display: flex; align-items: center; }
.guidance-body { padding: 1rem; }
.guidance-body p { margin-bottom: 0.75rem; line-height: 1.6; }
.guidance-refs { background: var(--border-light); padding: 0.75rem; border-radius: 4px; font-size: 0.85rem; }
.guidance-refs ul { margin: 0.25rem 0 0; padding-left: 1.25rem; }
.guidance-refs li { margin-bottom: 0.25rem; }

/* ===== Tabs ===== */
.tabs { display: flex; gap: 0.25rem; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 0.5rem 1rem; cursor: pointer; font-size: 0.9rem; color: var(--text-muted); transition: all 0.2s; }
.tab:hover { color: var(--primary); }
.tab-active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

/* ===== Kanban Board (Module 2) ===== */
.kanban-board { display: flex; gap: 0.75rem; overflow-x: auto; padding-bottom: 1rem; }
.kanban-column { min-width: 180px; flex: 1; background: var(--border-light); border-radius: 8px; padding: 0.5rem; }
.kanban-column-header { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.5rem 0.75rem; font-weight: 600; font-size: 0.8rem; color: var(--text); }
.kanban-count { background: var(--border); color: var(--text-muted); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
.kanban-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.15s; font-size: 0.8rem; }
.kanban-card:hover { box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); border-color: var(--primary-light); }
.kanban-card-risk { border-left: 3px solid var(--danger); }
.kanban-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; }
.kanban-app-id { font-weight: 600; font-size: 0.75rem; color: var(--primary); }
.kanban-card-manufacturer { font-weight: 500; margin-bottom: 0.35rem; }
.kanban-card-meta { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 0.75rem; margin-bottom: 0.25rem; }
.kanban-card-footer { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 0.7rem; padding-top: 0.25rem; border-top: 1px solid var(--border-light); }
.kanban-empty { text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 1rem; }

.detail-header { display: flex; justify-content: space-between; align-items: flex-start; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.9rem; }

.timeline { padding-left: 1rem; }
.timeline-item { display: flex; align-items: flex-start; gap: 0.75rem; padding-bottom: 1rem; position: relative; }
.timeline-item:not(:last-child)::before { content: ""; position: absolute; left: 5px; top: 14px; bottom: 0; width: 2px; background: var(--border); }
.timeline-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--border); border: 2px solid var(--surface); flex-shrink: 0; margin-top: 2px; }
.timeline-current .timeline-dot { background: var(--primary); box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.2); }
.risk-list li, .action-list li { margin-bottom: 0.35rem; line-height: 1.5; }
.risk-list li { color: var(--danger); }
.action-list li { color: var(--primary); }

/* ===== Country Chart (Module 2) ===== */
.country-grid { display: flex; flex-direction: column; gap: 0.5rem; }
.country-item { display: flex; align-items: center; gap: 0.75rem; }
.country-name { width: 100px; font-size: 0.85rem; text-align: right; flex-shrink: 0; }
.country-bar-container { flex: 1; height: 18px; background: var(--border-light); border-radius: 3px; overflow: hidden; }
.country-bar { height: 100%; background: var(--primary); border-radius: 3px; min-width: 4px; transition: width 0.3s; }
.country-count { width: 24px; font-size: 0.85rem; font-weight: 600; flex-shrink: 0; }

/* ===== Surveillance Heatmap (Module 5) ===== */
.risk-heatmap { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; }
.heatmap-cell { border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem; text-align: center; transition: all 0.15s; }
.heatmap-cell:hover { box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08); }
.heatmap-name { font-size: 0.75rem; font-weight: 500; margin-bottom: 0.25rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.heatmap-score { font-size: 1.2rem; margin-bottom: 0.15rem; }
.heatmap-meta { display: flex; flex-direction: column; gap: 0.1rem; }

/* ===== Attention List (Module 5) ===== */
.attention-list { display: flex; flex-direction: column; gap: 0.75rem; }
.attention-item { display: flex; gap: 0.75rem; padding: 0.75rem; border-radius: 6px; border: 1px solid var(--border); transition: all 0.15s; }
.attention-item:hover { box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08); }
.attention-critical { border-left: 3px solid var(--danger); }
.attention-high { border-left: 3px solid var(--danger); }
.attention-medium { border-left: 3px solid var(--warning); }
.attention-item p { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
.attention-badge { flex-shrink: 0; }

/* ===== Complaint Cards (Module 5) ===== */
.complaint-card { border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; margin-bottom: 0.75rem; }
.complaint-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem; }
.complaint-desc { font-style: italic; color: var(--text); margin-bottom: 0.35rem; }
.complaint-source { font-size: 0.8rem; color: var(--text-muted); }
.complaint-correlation { font-size: 0.8rem; color: var(--primary); margin-top: 0.25rem; }
</style>

function StatusBadge({ status }) {
  const styles = { pass:"badge-pass", fail:"badge-fail", warning:"badge-warning", na:"badge-na" };
  const labels = { pass:"PASS", fail:"FAIL", warning:"WARNING", na:"N/A" };
  return <span className={`badge ${styles[status]}`}>{labels[status]}</span>;
}

function SeverityBadge({ severity }) {
  const styles = { critical:"badge-fail", major:"badge-warning", minor:"badge-na" };
  return <span className={`badge ${styles[severity] || "badge-na"}`}>{severity.toUpperCase()}</span>;
}

function UploadScreen({ onUpload }) {
  const [dragging, setDragging] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);

  const handleUpload = () => {
    setUploading(true);
    setProgress(0);
    const interval = setInterval(() => {
      setProgress(p => {
        if (p >= 100) { clearInterval(interval); setTimeout(onUpload, 300); return 100; }
        return p + 20;
      });
    }, 400);
  };

  return (
    <div className="card">
      <h2>Upload Application Package</h2>
      <p style={{color:"var(--text-muted)",marginBottom:"1.5rem"}}>
        Upload a respirator approval application package for automated pre-screening against the applicable Standard Application Procedure.
      </p>
      <div className={`upload-zone ${dragging ? "dragging" : ""}`}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={e => { e.preventDefault(); setDragging(false); handleUpload(); }}
        onClick={handleUpload}>
        {!uploading ? (<>
          <div style={{fontSize:"2rem",marginBottom:"0.5rem"}}>+</div>
          <p><strong>Click or drag files</strong> to upload application package</p>

        </>) : (<>
          <p style={{marginBottom:"0.5rem"}}><strong>Processing application package...</strong></p>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}} /></div>
          <p style={{color:"var(--text-muted)",fontSize:"0.85rem",marginTop:"0.5rem"}}>
            {progress < 40 ? "Identifying respirator class..." : progress < 70 ? "Selecting SAP checklist for FFR..." : progress < 100 ? "Parsing documents and cross-referencing..." : "Complete — generating report"}

        <strong>Demo Note:</strong> This will load a simulated application from AirShield Safety Corp for an N95 FFR, pre-populated with realistic deficiencies for demonstration purposes.
      </div>
    </div>
  );
}

function getDocStatus(doc) {
  if (!doc.present && doc.compliant) return "na";
  if (!doc.present) return "fail";
  if (!doc.compliant) return "fail";
  return "pass";
}

      </div>

        <thead><tr><th style={{width:"50px"}}>#</th><th>Requirement</th><th style={{width:"100px"}}>Status</th><th style={{width:"100px"}}>Severity</th><th>Notes</th></tr></thead>
        <tbody>
          {checklist.items.map(item => {
            const doc = app.documents.find(d => d.checklistItemId === item.id);
            if (!doc) return null;
            const status = getDocStatus(doc);
            return (
              <tr key={item.id} className={status === "fail" ? "row-fail" : ""}>
                <td>{item.id}</td>
                <td><strong>{item.requirement}</strong><br/><span style={{fontSize:"0.8rem",color:"var(--text-muted)"}}>{item.sapSection} | {item.cfrReference}</span></td>

function SummaryScreen({ app, onRestart }) {
  const passCount = app.documents.filter(d => d.present && d.compliant).length;
  const failCount = app.documents.filter(d => d.present && !d.compliant).length;
  const totalApplicable = app.documents.filter(d => d.present || !d.compliant).length;
  const criticalCount = app.documents.filter(d => {
    if (d.present && d.compliant) return false;
    if (!d.present && d.compliant) return false;
    const item = FFR_SAP_CHECKLIST.items.find(i => i.id === d.checklistItemId);
    return item?.severity === "critical";
  }).length;
  const majorCount = failCount - criticalCount;
  const pct = Math.round((passCount / totalApplicable) * 100);

  return (
    <div className="card">
      <h2>Pre-Screening Summary</h2>
      <p style={{color:"var(--text-muted)",marginBottom:"1.5rem"}}>{app.manufacturerName} — {app.modelDesignation} ({app.applicationId})</p>
      <div className="kpi-row">
        <div className="kpi-card"><div className="kpi-value" style={{color:"var(--success)"}}>{passCount}</div><div className="kpi-label">Requirements Met</div></div>
        <div className="kpi-card"><div className="kpi-value" style={{color:"var(--danger)"}}>{failCount}</div><div className="kpi-label">Deficiencies Found</div></div>
        <div className="kpi-card"><div className="kpi-value" style={{color:"var(--danger)"}}>{criticalCount}</div><div className="kpi-label">Critical</div></div>
        <div className="kpi-card"><div className="kpi-value" style={{color:"var(--warning)"}}>{majorCount}</div><div className="kpi-label">Major</div></div>
      </div>
      <div style={{marginTop:"1.5rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"0.25rem"}}><span>Submission Readiness</span><span>{pct}%</span></div>
        <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,backgroundColor:pct > 80 ? "var(--success)" : pct > 50 ? "var(--warning)" : "var(--danger)"}} /></div>
      </div>
      <div className="info-box" style={{marginTop:"1.5rem",borderColor:"var(--danger)",backgroundColor:"rgba(220, 38, 38, 0.05)"}}>
        <strong>Recommendation:</strong> This application package has {criticalCount} critical and {majorCount} major deficiencies that must be resolved before it can proceed to formal review. The applicant should address all items identified in the remediation guidance and resubmit.
      </div>
      <div style={{marginTop:"1.5rem",display:"flex",gap:"0.75rem",justifyContent:"flex-end"}}>
        <button className="btn btn-secondary" onClick={onRestart}>Screen Another Application</button>
        <button className="btn btn-primary">Export PDF Report</button>
        <button className="btn btn-secondary">Forward to Reviewer</button>
      </div>
    </div>
  );
}

function RiskBadge({ level }) {
  if (level === "NONE") return null;
  const cls = level === "HIGH" ? "badge-fail" : level === "MEDIUM" ? "badge-warning" : "badge-pass";
  return <span className={`badge ${cls}`}>{level} RISK</span>;
}

                    <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" />
                    <XAxis dataKey="quarter" tick={{fontSize:10}} />
                    <YAxis tick={{fontSize:10}} domain={trend.thresholdDirection === "min" ? [dataMin => Math.min(dataMin, trend.threshold) - 1, "auto"] : ["auto", dataMax => Math.max(dataMax, trend.threshold) + 2]} />
                    <Tooltip />
                    <ReferenceLine y={trend.threshold} stroke="#dc2626" strokeDasharray="5 5" label={{value:`${trend.thresholdDirection === "min" ? "Min" : "Max"}: ${trend.threshold}${trend.unit}`,position:"right",fontSize:10,fill:"#dc2626"}} />
                    <Line type="monotone" dataKey="value" stroke={lineColor} strokeWidth={2} dot={{r:4}} />
                  </LineChart>
                </ResponsiveContainer>
                <div style={{textAlign:"center",fontSize:"0.8rem",color:"var(--text-muted)"}}>Threshold: {trend.thresholdDirection === "min" ? ">=" : "<="} {trend.threshold}{trend.unit}</div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="card" style={{marginTop:"1rem"}}>
        <h3>Latest Field Audit Results</h3>
        <table className="data-table">
          <thead><tr><th>Audit ID</th><th>Test</th><th>Benchmark</th><th>Latest</th><th>Drift</th><th>Threshold</th><th>Status</th></tr></thead>
          <tbody>{safeAirAudits.map(a => (
            <tr key={a.auditId} className={a.status === "warning" ? "row-fail" : ""}>
              <td>{a.auditId}</td><td>{a.testType}</td><td>{a.originalBenchmark}{a.unit}</td><td>{a.latestResult}{a.unit}</td>
              <td style={{color:a.status === "warning" ? "var(--danger)" : "inherit",fontWeight:a.status === "warning" ? 700 : 400}}>{a.drift > 0 ? "+" : ""}{a.drift}{a.unit}</td>
              <td>{a.thresholdDirection === "min" ? ">=" : "<="} {a.threshold}{a.unit}</td>
              <td><span className={`badge ${a.status === "warning" ? "badge-warning" : "badge-pass"}`}>{a.status.toUpperCase()}</span></td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div className="card" style={{marginTop:"1rem"}}>
        <h3>Correlated Complaints ({safeAirComplaints.length})</h3>
        {safeAirComplaints.map(c => (
          <div className="complaint-card" key={c.complaintId}>
            <div className="complaint-header">
              <span><strong>{c.complaintId}</strong> — {c.date}</span>
              <span className={`badge ${c.aiSeverity === "High" ? "badge-fail" : "badge-warning"}`}>{c.aiSeverity} (P{c.aiPriority})</span>
            </div>
            <p className="complaint-desc">"{c.description}"</p>
            <p className="complaint-source">Source: {c.source} | Product: {c.product}</p>
            {c.correlatedAuditIds.length > 0 && <p className="complaint-correlation">Correlated with: {c.correlatedAuditIds.join(", ")}</p>}
          </div>
        ))}
      </div>
      <div className="card" style={{marginTop:"1rem"}}>
        <h3>AI Recommendation</h3>
        <div className="info-box" style={{marginBottom:"1rem"}}><strong>Human Review Notice:</strong> This recommendation is AI-generated. Initiation of NRI and enforcement actions requires authorization by program management.</div>
        <div className="guidance-card" style={{borderColor:"var(--danger)"}}>
          <div className="guidance-body">
            <p><strong>Initiate Nonconformance Response Investigation (NRI) per CA 2023-1062.</strong> Performance metrics for SafeAir Technologies SA-Pro N95 (TC 84A-5678) are trending toward failure thresholds across all three test parameters:</p>
            <ul style={{margin:"0.75rem 0"}}>
              <li>NaCl Filtration Efficiency: 96.2% (down from 99.1%, threshold &ge; 95%)</li>
              <li>Inhalation Resistance: 38 mmH&#8322;O (up from 30, threshold &le; 35 — <strong>EXCEEDS LIMIT</strong>)</li>
              <li>Exhalation Resistance: 26 mmH&#8322;O (up from 21, threshold &le; 25 — <strong>EXCEEDS LIMIT</strong>)</li>
            </ul>
            <p>A correlated complaint cluster (3 complaints in 5 days) suggests a systemic manufacturing issue. Recommend requesting product samples from current production lots for independent lab testing and notifying the manufacturer of the pending NRI.</p>
          </div>
        </div>
        <div style={{marginTop:"1rem",display:"flex",gap:"0.75rem",justifyContent:"flex-end"}}>
          <button className="btn btn-primary">Initiate NRI</button>
          <button className="btn btn-secondary">Request Samples</button>
          <button className="btn btn-secondary">Schedule Site Visit</button>
          <button className="btn btn-secondary">Contact Manufacturer</button>
        </div>
      </div>
    </div>
  );
}

function ComplaintQueue({ onBack }) {
  const [expanded, setExpanded] = useState(null);
  return (
    <div>
      <button className="btn btn-secondary" onClick={onBack} style={{marginBottom:"1rem"}}>&larr; Back to Overview</button>
      <div className="card">
        <h2>Complaint Triage Queue</h2>
        <p style={{color:"var(--text-muted)",marginBottom:"1rem"}}>AI-prioritized complaints sorted by severity, correlation with field audit data, and pattern detection.</p>
        <table className="data-table">
          <thead><tr><th>ID</th><th>Date</th><th>Source</th><th>Manufacturer</th><th>Product</th><th>Severity</th><th>Priority</th><th></th></tr></thead>
          <tbody>
            {COMPLAINTS.sort((a, b) => a.aiPriority - b.aiPriority).map(c => (
              <React.Fragment key={c.complaintId}>
                <tr className={c.aiSeverity === "High" ? "row-fail" : ""} style={{cursor:"pointer"}} onClick={() => setExpanded(expanded === c.complaintId ? null : c.complaintId)}>
                  <td><strong>{c.complaintId}</strong></td><td>{c.date}</td><td>{c.source}</td><td>{c.manufacturer}</td><td>{c.product}</td>
                  <td><span className={`badge ${c.aiSeverity === "High" ? "badge-fail" : c.aiSeverity === "Medium" ? "badge-warning" : "badge-pass"}`}>{c.aiSeverity}</span></td>
                  <td>P{c.aiPriority}</td><td>{expanded === c.complaintId ? "\u25B2" : "\u25BC"}</td>
                </tr>
                {expanded === c.complaintId && (
                  <tr><td colSpan={8} style={{padding:"1rem",backgroundColor:"var(--surface)"}}>
                    <div style={{marginBottom:"0.75rem"}}><strong>Complaint:</strong> "{c.description}"</div>
                    <div style={{marginBottom:"0.75rem"}}><strong>AI Analysis:</strong> {c.aiRationale}</div>
                    <div style={{marginBottom:"0.75rem"}}><strong>Recommendation:</strong> {c.aiRecommendation}</div>
                    {c.correlatedAuditIds.length > 0 && <div><strong>Correlated Audits:</strong> {c.correlatedAuditIds.join(", ")}</div>}
                  </td></tr>
                )}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function CounterfeitMonitoring({ onBack }) {
  return (
    <div>
      <button className="btn btn-secondary" onClick={onBack} style={{marginBottom:"1rem"}}>&larr; Back to Overview</button>
      <div className="card">
        <div className="detail-header">
          <div><h2>Counterfeit & Fraud Monitoring</h2><p style={{color:"var(--text-muted)"}}>Marketplace scanning, CEL cross-reference, and investigation tracking</p></div>
          <div style={{textAlign:"right"}}><div className="kpi-value">{SURVEILLANCE_KPIS.fraudulentListingsInvestigatedYTD.toLocaleString()}</div><div style={{fontSize:"0.8rem",color:"var(--text-muted)"}}>Fraudulent listings investigated YTD</div></div>
        </div>
        <table className="data-table" style={{marginTop:"1.5rem"}}>
          <thead><tr><th>Alert ID</th><th>Date</th><th>Source</th><th>Product</th><th>Claimed TC#</th><th>CEL Match</th><th>Status</th></tr></thead>
          <tbody>{COUNTERFEIT_ALERTS.map(a => (
            <tr key={a.alertId}>
              <td><strong>{a.alertId}</strong></td><td>{a.date}</td><td>{a.source}</td><td>{a.product}</td>
              <td style={{fontFamily:"monospace"}}>{a.claimedTcNumber}</td><td><CelMatchBadge match={a.celMatch} /></td>
              <td><span className={`badge ${a.status.includes("CPIP") ? "badge-fail" : a.status.includes("Referral") ? "badge-fail" : "badge-warning"}`}>{a.status}</span></td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      {COUNTERFEIT_ALERTS.map(a => (
        <div className="card" key={a.alertId} style={{marginTop:"1rem"}}>
          <h3>{a.alertId} — {a.product}</h3>
          <div className="detail-grid" style={{marginBottom:"0.75rem"}}>
            <div><strong>Source:</strong> {a.source}</div><div><strong>Date:</strong> {a.date}</div>
            <div><strong>Claimed TC#:</strong> <code>{a.claimedTcNumber}</code></div><div><strong>CEL Result:</strong> <CelMatchBadge match={a.celMatch} /></div>
          </div>
          <div className="info-box" style={{borderColor:a.celMatch === "no_match" || a.celMatch === "mismatch" ? "var(--danger)" : "var(--warning)",backgroundColor:a.celMatch === "no_match" || a.celMatch === "mismatch" ? "rgba(220, 38, 38, 0.05)" : "rgba(245, 158, 11, 0.05)"}}>
            <strong>Issue:</strong> {a.issue}
          </div>
        </div>
      ))}
      <div className="card" style={{marginTop:"1rem"}}>
        <h3>CPIP Auto-Trigger Thresholds</h3>
        <p style={{color:"var(--text-muted)",fontSize:"0.85rem",marginBottom:"1rem"}}>Configurable rules for automated Certified Product Investigation Process (CPIP) initiation.</p>
        <table className="data-table">
          <thead><tr><th>Rule</th><th>Threshold</th><th>Mode</th></tr></thead>
          <tbody>
            <tr><td>Filtration efficiency drift</td><td>&gt; 2% decline from benchmark</td><td><span className="badge badge-warning">Recommend & Confirm</span></td></tr>
            <tr><td>Resistance exceeds regulatory limit</td><td>Inhalation &gt; 35 mmH&#8322;O or Exhalation &gt; 25 mmH&#8322;O</td><td><span className="badge badge-fail">Auto-Initiate</span></td></tr>
            <tr><td>Correlated complaint cluster</td><td>3+ complaints on same product within 60 days</td><td><span className="badge badge-warning">Recommend & Confirm</span></td></tr>
            <tr><td>CEL mismatch on counterfeit alert</td><td>Any confirmed No Match or Mismatch</td><td><span className="badge badge-fail">Auto-Initiate</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

function SurveillanceDashboard() {
  const [view, setView] = useState("overview");
  return (
    <div>
      <div className="module-header">
        <h1>Module 5: Post-Market Surveillance Dashboard</h1>
        <p>Unified surveillance dashboard aggregating field audits, complaints, and counterfeit intelligence with AI-assisted triage and trend detection.</p>
      </div>
      {view === "overview" && <OverviewDashboard onNavigate={v => setView(v)} />}
      {view === "drift" && <DriftDetail onBack={() => setView("overview")} />}
      {view === "complaints" && <ComplaintQueue onBack={() => setView("overview")} />}
      {view === "counterfeit" && <CounterfeitMonitoring onBack={() => setView("overview")} />}
    </div>
  );
}

          </div>

          <button className={`nav-btn ${activeModule === "module2" ? "nav-active" : ""}`} onClick={() => setActiveModule("module2")}>

          <button className={`nav-btn ${activeModule === "module5" ? "nav-active" : ""}`} onClick={() => setActiveModule("module5")}>

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
